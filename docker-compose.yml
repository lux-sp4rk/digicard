version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./netlify:/app/netlify
      - ./scripts:/app/scripts

      # Exclude node_modules from being overwritten
      - /app/node_modules

    environment:
      # Vite environment variables
      - VITE_CONTENTFUL_SPACE_ID=${VITE_CONTENTFUL_SPACE_ID:-}
      - VITE_CONTENTFUL_ACCESS_TOKEN=${VITE_CONTENTFUL_ACCESS_TOKEN:-}
      - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID:-}
      - VITE_UMAMI_SCRIPT_URL=${VITE_UMAMI_SCRIPT_URL:-}

      # Server-side environment variables
      - BEEHIIV_API_KEY=${BEEHIIV_API_KEY:-}
      - BEEHIIV_PUBLICATION_ID=${BEEHIIV_PUBLICATION_ID:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_CHANNEL_ID=${YOUTUBE_CHANNEL_ID:-}

    stdin_open: true
    tty: true

    # Restart policy
    restart: unless-stopped

    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
