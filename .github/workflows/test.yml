name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable corepack (for pnpm)
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test
        env:
          VITE_CONTENTFUL_SPACE_ID: test_space_id
          VITE_CONTENTFUL_ACCESS_TOKEN: test_access_token
          VITE_UMAMI_WEBSITE_ID: test_umami_id
          VITE_UMAMI_SCRIPT_URL: https://test.umami.example.com
          BEEHIIV_API_KEY: test_beehiiv_key
          BEEHIIV_PUBLICATION_ID: test_publication_id

      - name: Generate coverage report
        if: always()
        run: pnpm run test:coverage
        continue-on-error: true
        env:
          VITE_CONTENTFUL_SPACE_ID: test_space_id
          VITE_CONTENTFUL_ACCESS_TOKEN: test_access_token
          VITE_UMAMI_WEBSITE_ID: test_umami_id
          VITE_UMAMI_SCRIPT_URL: https://test.umami.example.com
          BEEHIIV_API_KEY: test_beehiiv_key
          BEEHIIV_PUBLICATION_ID: test_publication_id

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          retention-days: 30