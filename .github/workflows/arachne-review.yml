name: Arachne Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  arachne-review:
    uses: lux-sp4rk/dotfiles/gh-actions/workflows/arachne-review.yml@main
    secrets:
      ARCEE_API_KEY: ${{ secrets.ARCEE_API_KEY }}
    with:
      passes: 'logic,security,judge'
      severity-threshold: 'warning'
