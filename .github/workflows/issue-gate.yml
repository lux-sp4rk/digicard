name: Issue Readiness Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-issue-ready:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Check linked issues for ready_for_dev or in_progress label
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            
            // Match issue references: Closes #123, Fixes #456, Resolves #789, #123
            const issueRefs = [...prBody.matchAll(/(?:closes|fixes|resolves|#)\s*(\d+)/gi)];
            
            if (issueRefs.length === 0) {
              console.log('No linked issues found in PR body. Skipping check.');
              return;
            }
            
            const issueNumbers = [...new Set(issueRefs.map(match => parseInt(match[1])))].filter(n => n > 0);
            console.log(`Found linked issues: ${issueNumbers.join(', ')}`);
            
            const notReadyIssues = [];
            const inProgressIssues = [];
            
            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                
                const labels = issue.labels.map(l => l.name);
                const hasReadyLabel = labels.includes('ready_for_dev');
                const hasInProgressLabel = labels.includes('in_progress');
                
                if (!hasReadyLabel && !hasInProgressLabel) {
                  notReadyIssues.push(`#${issueNumber} (${issue.title})`);
                } else if (hasInProgressLabel) {
                  inProgressIssues.push(`#${issueNumber}`);
                }
              } catch (error) {
                console.log(`Could not fetch issue #${issueNumber}: ${error.message}`);
              }
            }
            
            if (notReadyIssues.length > 0) {
              core.setFailed(
                `The following linked issues are not ready for development:\n` +
                notReadyIssues.map(i => `  - ${i}`).join('\n') +
                `\n\nIssues must have 'ready_for_dev' or 'in_progress' label before merging.`
              );
            } else {
              console.log('All linked issues are ready. ✓');
              if (inProgressIssues.length > 0) {
                console.log(`Issues in progress: ${inProgressIssues.join(', ')}`);
              }
            }
