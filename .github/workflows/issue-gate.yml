name: Issue Readiness Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-issue-ready:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Check linked issues for ready_for_dev label
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            
            // Match issue references: Closes #123, Fixes #456, Resolves #789, #123
            const issueRefs = [...prBody.matchAll(/(?:closes|fixes|resolves|#)\s*(\d+)/gi)];
            
            if (issueRefs.length === 0) {
              console.log('No linked issues found in PR body. Skipping check.');
              return;
            }
            
            const issueNumbers = [...new Set(issueRefs.map(match => parseInt(match[1])))].filter(n => n > 0);
            console.log(`Found linked issues: ${issueNumbers.join(', ')}`);
            
            const notReadyIssues = [];
            
            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                
                const hasReadyLabel = issue.labels.some(label => 
                  label.name === 'ready_for_dev'
                );
                
                if (!hasReadyLabel) {
                  notReadyIssues.push(`#${issueNumber} (${issue.title})`);
                }
              } catch (error) {
                console.log(`Could not fetch issue #${issueNumber}: ${error.message}`);
              }
            }
            
            if (notReadyIssues.length > 0) {
              core.setFailed(
                `The following linked issues are not ready for development (missing 'ready_for_dev' label):\n` +
                notReadyIssues.map(i => `  - ${i}`).join('\n') +
                `\n\nPlease ensure all linked issues are properly labeled before merging.`
              );
            } else {
              console.log('All linked issues have ready_for_dev label. ✓');
            }
