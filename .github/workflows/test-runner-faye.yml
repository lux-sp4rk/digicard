name: Test Runner Faye

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-runner:
    name: Test Runner Faye
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout Faye action
        uses: actions/checkout@v4
        with:
          repository: lux-sp4rk/test-runner-faye
          path: .github/actions/test-runner-faye
          token: ${{ secrets.PAT_TEST_RUNNER }}

      - name: Summon Faye
        uses: ./.github/actions/test-runner-faye
        continue-on-error: false
        with:
          arcee-api-key: ${{ secrets.ARCEE_API_KEY }}
          passes: 'test,coverage,delta'
          coverage-threshold: 80
